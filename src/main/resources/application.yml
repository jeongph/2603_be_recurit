spring:
  application:
    name: subscription-service

  datasource:
    url: jdbc:mysql://localhost:3306/artinus?allowPublicKeyRetrieval=true&useSSL=false
    username: artinus
    password: artinus
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

history:
  summary:
    event-limit: 20

logging:
  level:
    com.artinus: INFO
    org.hibernate.SQL: WARN
