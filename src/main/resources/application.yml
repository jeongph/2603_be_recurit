spring:
  application:
    name: subscription-service

  profiles:
    active: stub

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:artinus}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:artinus}
    password: ${DB_PASSWORD:artinus}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        # circuitbreakers, retries 는 외부 의존성 토폴로지를 추론 가능하게 하므로
        # 기본 프로파일에서는 노출하지 않는다. 배포 시 Spring Security +
        # 내부망 제한 뒤에서 별도 프로파일로 추가한다.
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: subscription-service

history:
  summary:
    event-limit: 20

csrng:
  base-url: https://csrng.net/csrng/csrng.php
  min: 0
  max: 1

llm:
  claude:
    base-url: https://api.anthropic.com
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-haiku-4-5-20251001
    max-tokens: 1024
    timeout: 10s

resilience4j:
  retry:
    instances:
      csrng:
        maxAttempts: 3
        waitDuration: 100ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignoreExceptions:
          - com.artinus.subscription.service.port.GateUnavailableException
      llm:
        maxAttempts: 2
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignoreExceptions:
          - com.artinus.history.service.port.SummarizerUnavailableException
  circuitbreaker:
    instances:
      csrng:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        automaticTransitionFromOpenToHalfOpenEnabled: true
      llm:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.artinus: INFO
    org.hibernate.SQL: WARN
